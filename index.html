<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 Book Collection</title>
  <link rel="stylesheet" href="main.css">
</head>
<body class="table-page">

  <div class="table-scene">
    <div class="table-photo"></div>

    <div class="books-layout">
      <a class="table-book book-back" href="book1/book1.html" data-book="book1" aria-label="Open Book 1">
        <span class="book-glow"></span>
        <span class="book-shadow"></span>
        <span class="book-stack"></span>
        <span class="book-face">
          <img src="book1_cover.png" alt="Book 1 cover">
        </span>
      </a>

      <a class="table-book book-middle" href="book2/book2.html" data-book="book2" aria-label="Open Book 2">
        <span class="book-glow"></span>
        <span class="book-shadow"></span>
        <span class="book-stack"></span>
        <span class="book-face">
          <img src="book2_cover.png" alt="Book 2 cover">
        </span>
      </a>

      <a class="table-book book-front" href="book3/book3.html" data-book="book3" aria-label="Open Book 3">
        <span class="book-glow"></span>
        <span class="book-shadow"></span>
        <span class="book-stack"></span>
        <span class="book-face">
          <img src="book3_cover.png" alt="Book 3 cover">
        </span>
      </a>
    </div>

    <div class="table-overlay"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
